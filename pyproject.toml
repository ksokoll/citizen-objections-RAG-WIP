[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "datacenter-behoerdencase"
version = "0.1.0"
description = "LLM-assisted Abwägungsstellungnahme pipeline for Einwendungen im Beteiligungsverfahren"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/einwendungen"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]
